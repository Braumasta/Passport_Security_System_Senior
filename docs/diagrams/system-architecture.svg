<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f9fc}.title{font:700 36px Arial;fill:#12345a}.box{fill:#fff;stroke:#b9c9da;stroke-width:2;rx:14}.host{fill:#eef5fb;stroke:#1a3a5c;stroke-width:3;rx:18}.label{font:700 20px Arial;fill:#102a43}.text{font:15px Arial;fill:#334e68}.small{font:13px Arial;fill:#526b84}.arrow{stroke:#1a3a5c;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#0f8b8d;stroke-width:3;fill:none;stroke-dasharray:8 7;marker-end:url(#arrow2)}.tag{fill:#dff7f6;stroke:#0f8b8d;stroke-width:1.5;rx:10}.tagtext{font:700 13px Arial;fill:#0f595b}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1a3a5c"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f8b8d"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="60" y="70">Passport Security System - Architecture</text>

  <rect class="box" x="65" y="155" width="230" height="120"/>
  <text class="label" x="95" y="200">Applicant Browser</text>
  <text class="text" x="95" y="230">Register, verify account,</text>
  <text class="text" x="95" y="252">submit passport request</text>

  <rect class="box" x="65" y="355" width="230" height="120"/>
  <text class="label" x="95" y="400">Staff/Admin Browser</text>
  <text class="text" x="95" y="430">Review documents, manage</text>
  <text class="text" x="95" y="452">users, decide applications</text>

  <rect class="host" x="405" y="235" width="280" height="170"/>
  <text class="label" x="455" y="285">Vercel Frontend</text>
  <text class="text" x="445" y="318">React + Vite SPA</text>
  <text class="text" x="445" y="344">Routes, forms, dashboards</text>
  <rect class="tag" x="445" y="365" width="145" height="28"/>
  <text class="tagtext" x="462" y="384">HTTPS Client</text>

  <rect class="host" x="805" y="180" width="330" height="280"/>
  <text class="label" x="875" y="230">Render Backend</text>
  <text class="text" x="850" y="265">Node.js + Express API</text>
  <text class="text" x="850" y="293">JWT authentication</text>
  <text class="text" x="850" y="321">Role-based access control</text>
  <text class="text" x="850" y="349">Email workflows</text>
  <text class="text" x="850" y="377">Supabase signed URL handling</text>
  <rect class="tag" x="850" y="405" width="170" height="28"/>
  <text class="tagtext" x="867" y="424">/api REST endpoints</text>

  <rect class="host" x="805" y="570" width="330" height="180"/>
  <text class="label" x="870" y="620">Python AI Runtime</text>
  <text class="text" x="850" y="653">Passport OCR orchestration</text>
  <text class="text" x="850" y="681">Account ID extraction</text>
  <text class="text" x="850" y="709">Image crops and fallback checks</text>

  <rect class="box" x="1260" y="120" width="260" height="120"/>
  <text class="label" x="1318" y="165">Supabase DB</text>
  <text class="text" x="1302" y="195">PostgreSQL tables</text>
  <text class="text" x="1302" y="217">users, applications, logs</text>

  <rect class="box" x="1260" y="285" width="260" height="120"/>
  <text class="label" x="1298" y="330">Supabase Storage</text>
  <text class="text" x="1294" y="360">ID images, selfies,</text>
  <text class="text" x="1294" y="382">passport docs, photos</text>

  <rect class="box" x="1260" y="505" width="260" height="115"/>
  <text class="label" x="1310" y="550">Gemini API</text>
  <text class="text" x="1290" y="580">OCR, translation, visual</text>
  <text class="text" x="1290" y="602">face/signature comparison</text>

  <rect class="box" x="1260" y="685" width="260" height="105"/>
  <text class="label" x="1310" y="728">SMTP Email</text>
  <text class="text" x="1293" y="758">codes, reminders, decisions</text>

  <path class="arrow" d="M295 215 C335 215 355 285 405 300"/>
  <text class="small" x="320" y="230">HTTPS</text>
  <path class="arrow" d="M295 415 C355 415 350 345 405 335"/>
  <text class="small" x="315" y="395">HTTPS</text>
  <path class="arrow" d="M685 320 L805 320"/>
  <text class="small" x="715" y="304">REST / JSON</text>
  <path class="arrow" d="M1135 255 L1260 180"/>
  <text class="small" x="1160" y="205">SQL</text>
  <path class="arrow" d="M1135 345 L1260 345"/>
  <text class="small" x="1160" y="327">upload / signed URLs</text>
  <path class="arrow" d="M970 460 L970 570"/>
  <text class="small" x="988" y="520">spawn Python</text>
  <path class="dash" d="M1135 660 C1200 660 1200 565 1260 565"/>
  <text class="small" x="1165" y="638">AI request</text>
  <path class="arrow" d="M1135 395 C1210 430 1195 710 1260 735"/>
  <text class="small" x="1160" y="700">email send</text>
  <path class="arrow" d="M1260 380 C1180 450 1180 600 1135 650"/>
  <text class="small" x="1185" y="515">document bytes</text>
</svg>
