<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100">
  <defs>
    <style>
      .bg{fill:#f6f9fc}.title{font:700 36px Arial;fill:#12345a}.entity{fill:#fff;stroke:#1a3a5c;stroke-width:2;rx:10}.head{fill:#1a3a5c}.htext{font:700 17px Arial;fill:#fff}.field{font:14px Consolas,monospace;fill:#23384d}.pk{fill:#e8f7ee}.fk{fill:#fff4dd}.rel{stroke:#284b63;stroke-width:2.4;fill:none}.note{font:13px Arial;fill:#526b84}.legend{fill:#fff;stroke:#b9c9da;stroke-width:1.5;rx:8}
    </style>
  </defs>
  <rect class="bg" width="1700" height="1100"/>
  <text class="title" x="55" y="70">Passport Security System - Entity Relationship Diagram</text>

  <rect class="legend" x="1210" y="45" width="420" height="80"/>
  <rect class="pk" x="1230" y="65" width="26" height="18"/><text class="note" x="1265" y="79">Primary key</text>
  <rect class="fk" x="1230" y="95" width="26" height="18"/><text class="note" x="1265" y="109">Foreign key / relationship field</text>

  <g id="users">
    <rect class="entity" x="85" y="135" width="310" height="335"/>
    <rect class="head" x="85" y="135" width="310" height="42"/>
    <text class="htext" x="105" y="162">users</text>
    <rect class="pk" x="95" y="190" width="290" height="24"/><text class="field" x="110" y="207">PK user_id</text>
    <text class="field" x="110" y="235">member_id UNIQUE</text>
    <text class="field" x="110" y="263">email UNIQUE</text>
    <text class="field" x="110" y="291">role</text>
    <text class="field" x="110" y="319">verification_status</text>
    <text class="field" x="110" y="347">national_id_number UNIQUE</text>
    <text class="field" x="110" y="375">profile_photo_path</text>
    <text class="field" x="110" y="403">password_hash</text>
    <rect class="fk" x="95" y="418" width="290" height="24"/><text class="field" x="110" y="435">FK applicant_id UNIQUE</text>
  </g>

  <g id="applicants">
    <rect class="entity" x="560" y="150" width="315" height="275"/>
    <rect class="head" x="560" y="150" width="315" height="42"/>
    <text class="htext" x="580" y="177">applicants</text>
    <rect class="pk" x="570" y="205" width="295" height="24"/><text class="field" x="585" y="222">PK applicant_id</text>
    <text class="field" x="585" y="250">first_name, last_name</text>
    <text class="field" x="585" y="278">father_name, mother_name</text>
    <text class="field" x="585" y="306">date_of_birth</text>
    <text class="field" x="585" y="334">place_of_birth</text>
    <text class="field" x="585" y="362">national_id_number UNIQUE</text>
    <text class="field" x="585" y="390">phone, email, address</text>
  </g>

  <g id="account_verifications">
    <rect class="entity" x="85" y="560" width="330" height="290"/>
    <rect class="head" x="85" y="560" width="330" height="42"/>
    <text class="htext" x="105" y="587">account_verifications</text>
    <rect class="pk" x="95" y="615" width="310" height="24"/><text class="field" x="110" y="632">PK account_verification_id</text>
    <rect class="fk" x="95" y="645" width="310" height="24"/><text class="field" x="110" y="662">FK user_id</text>
    <text class="field" x="110" y="690">verification_code UNIQUE</text>
    <text class="field" x="110" y="718">status, ai_score</text>
    <text class="field" x="110" y="746">extracted_data JSONB</text>
    <text class="field" x="110" y="774">failures JSONB</text>
    <text class="field" x="110" y="802">warnings JSONB</text>
    <text class="field" x="110" y="830">id_face_image_path</text>
  </g>

  <g id="user_verification_files">
    <rect class="entity" x="520" y="585" width="350" height="245"/>
    <rect class="head" x="520" y="585" width="350" height="42"/>
    <text class="htext" x="540" y="612">user_verification_files</text>
    <rect class="pk" x="530" y="640" width="330" height="24"/><text class="field" x="545" y="657">PK verification_file_id</text>
    <rect class="fk" x="530" y="670" width="330" height="24"/><text class="field" x="545" y="687">FK user_id</text>
    <rect class="fk" x="530" y="700" width="330" height="24"/><text class="field" x="545" y="717">FK account_verification_id</text>
    <text class="field" x="545" y="745">document_type</text>
    <text class="field" x="545" y="773">file_name</text>
    <text class="field" x="545" y="801">file_path</text>
  </g>

  <g id="passport_applications">
    <rect class="entity" x="1035" y="145" width="355" height="380"/>
    <rect class="head" x="1035" y="145" width="355" height="42"/>
    <text class="htext" x="1055" y="172">passport_applications</text>
    <rect class="pk" x="1045" y="200" width="335" height="24"/><text class="field" x="1060" y="217">PK application_id</text>
    <rect class="fk" x="1045" y="230" width="335" height="24"/><text class="field" x="1060" y="247">FK applicant_id</text>
    <text class="field" x="1060" y="275">application_reference UNIQUE</text>
    <text class="field" x="1060" y="303">status</text>
    <text class="field" x="1060" y="331">application_type</text>
    <text class="field" x="1060" y="359">passport_type</text>
    <text class="field" x="1060" y="387">passport_number, can_number</text>
    <text class="field" x="1060" y="415">registry_place, registry_number</text>
    <text class="field" x="1060" y="443">ai_score, ai_extracted_data</text>
    <text class="field" x="1060" y="471">reviewed_by, cancelled_by</text>
    <text class="field" x="1060" y="499">extracted image paths</text>
  </g>

  <g id="documents">
    <rect class="entity" x="1040" y="620" width="330" height="220"/>
    <rect class="head" x="1040" y="620" width="330" height="42"/>
    <text class="htext" x="1060" y="647">documents</text>
    <rect class="pk" x="1050" y="675" width="310" height="24"/><text class="field" x="1065" y="692">PK document_id</text>
    <rect class="fk" x="1050" y="705" width="310" height="24"/><text class="field" x="1065" y="722">FK application_id</text>
    <text class="field" x="1065" y="750">document_type</text>
    <text class="field" x="1065" y="778">file_name</text>
    <text class="field" x="1065" y="806">file_path</text>
    <text class="field" x="1065" y="834">verification_status</text>
  </g>

  <g id="passport_records">
    <rect class="entity" x="1415" y="620" width="250" height="220"/>
    <rect class="head" x="1415" y="620" width="250" height="42"/>
    <text class="htext" x="1435" y="647">passport_records</text>
    <rect class="pk" x="1425" y="675" width="230" height="24"/><text class="field" x="1440" y="692">PK passport_id</text>
    <rect class="fk" x="1425" y="705" width="230" height="24"/><text class="field" x="1440" y="722">FK application_id UNIQUE</text>
    <text class="field" x="1440" y="750">passport_number UNIQUE</text>
    <text class="field" x="1440" y="778">issue_date</text>
    <text class="field" x="1440" y="806">expiry_date</text>
    <text class="field" x="1440" y="834">passport_status</text>
  </g>

  <g id="audit_logs">
    <rect class="entity" x="520" y="900" width="350" height="155"/>
    <rect class="head" x="520" y="900" width="350" height="42"/>
    <text class="htext" x="540" y="927">audit_logs</text>
    <rect class="pk" x="530" y="955" width="330" height="24"/><text class="field" x="545" y="972">PK log_id</text>
    <rect class="fk" x="530" y="985" width="330" height="24"/><text class="field" x="545" y="1002">FK user_id nullable</text>
    <text class="field" x="545" y="1030">action, entity_type, details JSONB</text>
  </g>

  <path class="rel" d="M395 430 C465 430 490 310 560 288"/>
  <text class="note" x="450" y="365">0..1 linked profile</text>

  <path class="rel" d="M250 470 L250 560"/>
  <text class="note" x="265" y="520">1 to many</text>

  <path class="rel" d="M395 405 C505 460 585 545 650 585"/>
  <text class="note" x="500" y="505">1 to many files</text>

  <path class="rel" d="M415 715 L520 715"/>
  <text class="note" x="440" y="700">1 to many</text>

  <path class="rel" d="M875 285 L1035 300"/>
  <text class="note" x="910" y="265">1 to many</text>

  <path class="rel" d="M1210 525 L1205 620"/>
  <text class="note" x="1220" y="575">1 to many</text>

  <path class="rel" d="M1390 730 L1415 730"/>
  <text class="note" x="1395" y="710">1 to 0..1</text>

  <path class="rel" d="M250 470 C280 960 420 980 520 985"/>
  <text class="note" x="330" y="940">user activity</text>

  <path class="rel" d="M1035 470 C940 520 925 900 870 985"/>
  <text class="note" x="905" y="860">staff reviewed_by / cancelled_by</text>
</svg>
